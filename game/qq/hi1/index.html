<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>hi 小鸡吧 - Ultra</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#e8f5e9;
            min-height:100vh;
            overflow:hidden;
            font-family:Arial,sans-serif;
            user-select: none;
        }
        .info{
            text-align:center;
            padding:15px;
            font-size:22px;
            font-weight:bold;
            color:#2e7d32;
        }
        #gameBox{
            width:100vw;
            height:80vh;
            position:relative;
            touch-action: none;  /* 禁止触摸时滚动页面 */
        }
        .role{
            width:100px;
            position:absolute;
            cursor:pointer;
            /* 确保元素能被 elementsFromPoint 检测到，不设 pointer-events:none */
            pointer-events: auto;
        }
        .btn{
            display:block;
            margin:10px auto;
            padding:10px 30px;
            border:none;
            background:#4caf50;
            color:#fff;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }
        .btn:hover{background:#388e3c;}
    </style>
</head>
<body>
    <div class="info">
        分数：<span id="score">0</span> | 剩余时间：<span id="time">30</span>秒
    </div>
    <button class="btn" id="startBtn">开始游戏</button>
    <div id="gameBox"></div>

<script>

const gifSrc = "https://hixiaojiba.pages.dev/f8e0c8d4429843d1e6837a02cbcbfe45.gif"; 

let score = 0;
let time = 30;
let timer = null;
let gameRun = false;
let isPressing = false;   // 是否按住

const gameBox = document.getElementById("gameBox");
const scoreDom = document.getElementById("score");
const timeDom = document.getElementById("time");
const startBtn = document.getElementById("startBtn");

// 随机坐标
function getRandomPos(){
    let w = window.innerWidth - 120;
    let h = window.innerHeight * 0.8 - 120;
    return {
        x: Math.max(0, Math.random() * w),
        y: Math.max(0, Math.random() * h)
    }
}

// 生成小鸡吧
function createRole(){
    let img = document.createElement("img");
    img.src = gifSrc;
    img.className = "role";
    let pos = getRandomPos();
    img.style.left = pos.x + "px";
    img.style.top = pos.y + "px";
    gameBox.appendChild(img);
}


function clearRole(){
    gameBox.innerHTML = "";
}

// 加分+移动小人
function harvestRole(role) {
    if(!gameRun) return;
    score = score + 0.5;
    scoreDom.innerText = score;
    let newPos = getRandomPos();
    role.style.left = newPos.x + "px";
    role.style.top = newPos.y + "px";
}

// 根据坐标获取该位置下的小人（如果有）
function getRoleAtPoint(x, y) {
    const elements = document.elementsFromPoint(x, y);
    for(let elem of elements) {
        if(elem.classList && elem.classList.contains('role')) {
            return elem;
        }
    }
    return null;
}


function onPointerDown(e) {
    if(!gameRun) return;
    isPressing = true;
    
    checkAndHarvest(e);
}

function onPointerMove(e) {
    if(!gameRun || !isPressing) return;
    checkAndHarvest(e);
}

function onPointerUp(e) {
    isPressing = false;
}

function onPointerCancel(e) {
    isPressing = false;
}

function checkAndHarvest(e) {
    let clientX, clientY;
    if(e.touches) {
        // 触摸事件
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        // 鼠标事件
        clientX = e.clientX;
        clientY = e.clientY;
    }
    const role = getRoleAtPoint(clientX, clientY);
    if(role) {
        harvestRole(role);
    }
}


function bindHarvestEvents() {
    
    gameBox.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    // 触摸事件
    gameBox.addEventListener('touchstart', onPointerDown, {passive: false});
    window.addEventListener('touchmove', onPointerMove, {passive: false});
    window.addEventListener('touchend', onPointerUp);
    window.addEventListener('touchcancel', onPointerCancel);
}

function unbindHarvestEvents() {
    gameBox.removeEventListener('mousedown', onPointerDown);
    window.removeEventListener('mousemove', onPointerMove);
    window.removeEventListener('mouseup', onPointerUp);
    gameBox.removeEventListener('touchstart', onPointerDown);
    window.removeEventListener('touchmove', onPointerMove);
    window.removeEventListener('touchend', onPointerUp);
    window.removeEventListener('touchcancel', onPointerCancel);
}

startBtn.onclick = function(){
    if(gameRun) return;
    gameRun = true;
    score = 0;
    time = 30;
    scoreDom.innerText = 0;
    timeDom.innerText = 30;
    clearRole();
    for(let i=0;i<3;i++) createRole();
    
    bindHarvestEvents();
    
    timer = setInterval(()=>{
        time--;
        timeDom.innerText = time;
        if(time <= 0){
            clearInterval(timer);
            gameRun = false;
            unbindHarvestEvents();
            alert(`游戏结束！得分：${score}`);
            clearRole();
        }
    },1000);
}
</script>
</body>
</html>
