<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>捂五悟Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        *:focus, *:focus-visible { outline: none !important; }

        body {
            font-family: 'Quicksand', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: #dce8d5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .container {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 780px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: top 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                        transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: top, transform;
        }
        .container.shifted { top: 20px; transform: translateX(-50%); }

        .title-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .main-title {
            font-size: clamp(4.2rem, 16vw, 8rem);
            font-weight: 700;
            letter-spacing: 14px;
            line-height: 1.15;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.1rem 1.2rem;
            color: #2d4a2d;
            user-select: none;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .main-title span { color: #2d4a2d; }
        .sub {
            font-size: clamp(0.8rem, 2.2vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 14px;
            text-transform: uppercase;
            color: #3d5a3d;
            opacity: 0.7;
            margin-top: 0.1rem;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .button-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem 1.2rem;
            margin-top: 2.2rem;
            width: 100%;
            max-width: 550px;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease 0.7s, transform 0.5s ease 0.7s;
            pointer-events: none;
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            background: rgba(45, 74, 45, 0.10);
            border: 1.5px solid #2d4a2d;
            color: #2d4a2d;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-decoration: none;
            font-family: 'Quicksand', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            cursor: pointer;
            text-align: center;
            flex: 1 0 auto;
            min-width: 100px;
            max-width: 160px;
            transition: transform 0.12s, background 0.12s;
            box-shadow: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        /* 悬停无变化 */
        .btn:hover {
            background: rgba(45, 74, 45, 0.10);
            transform: none;
        }
        /* 点击特效 —— 由 JS 添加 .pressed 类触发 */
        .btn.pressed {
            transform: scale(0.93);
            background: rgba(45, 74, 45, 0.30);
        }

        .container.shifted .button-grid {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .container.shifted .main-title {
            font-size: clamp(2.8rem, 8vw, 4.6rem);
            letter-spacing: 8px;
            gap: 0.1rem 0.6rem;
        }
        .container.shifted .sub {
            font-size: clamp(0.6rem, 1.6vw, 0.9rem);
            letter-spacing: 8px;
            margin-top: 0.2rem;
        }

        .footer-credit {
            position: fixed;
            bottom: 24px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 300;
            color: #5a7a5a;
            letter-spacing: 2px;
            opacity: 0.55;
            font-family: 'Quicksand', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            pointer-events: none;
            z-index: 10;
        }

        @media (max-width: 480px) {
            .main-title { letter-spacing: 6px; }
            .sub { letter-spacing: 8px; }
            .container.shifted .main-title { letter-spacing: 4px; }
            .container.shifted .sub { letter-spacing: 6px; }
            .container.shifted { top: 12px; }
            .footer-credit { font-size: 0.6rem; bottom: 16px; }
            .btn { font-size: 0.8rem; padding: 0.5rem 1rem; min-width: 70px; max-width: 130px; }
            .button-grid { gap: 0.5rem 0.7rem; }
        }

        .fade-in { animation: fadeUp 0.9s ease forwards; }
        @keyframes fadeUp { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container fade-in" id="container">
        <div class="title-wrapper">
            <h1 class="main-title"><span>捂</span><span>五</span><span>悟</span></h1>
            <div class="sub">· wu · wu · wu ·</div>
        </div>
        <div class="button-grid" id="buttonGrid">
            <a href="./game/" target="_blank" class="btn" id="btn1">游戏</a>
            <a href="#" class="btn" id="btn2">按钮二</a>
            <a href="#" class="btn" id="btn3">按钮三</a>
            <a href="#" class="btn" id="btn4">按钮四</a>
            <a href="#" class="btn" id="btn5">按钮五</a>
        </div>
    </div>
    <div class="footer-credit">Powered by DeepSeek</div>

    <script>
        (function() {
            var container = document.getElementById('container');
            container.classList.remove('shifted');
            window.addEventListener('load', function() {
                setTimeout(function() { container.classList.add('shifted'); }, 500);
            });

            // 为所有按钮添加点击特效（pressed 类控制）
            var buttons = document.querySelectorAll('.btn');
            buttons.forEach(function(btn) {
                // 鼠标按下
                btn.addEventListener('mousedown', function(e) {
                    this.classList.add('pressed');
                });
                // 鼠标松开（在任意位置松开都移除）
                btn.addEventListener('mouseup', function(e) {
                    this.classList.remove('pressed');
                });
                // 鼠标离开按钮时移除（防止卡住）
                btn.addEventListener('mouseleave', function(e) {
                    this.classList.remove('pressed');
                });
                // 触摸事件（移动端）
                btn.addEventListener('touchstart', function(e) {
                    this.classList.add('pressed');
                }, { passive: true });
                btn.addEventListener('touchend', function(e) {
                    this.classList.remove('pressed');
                }, { passive: true });
                btn.addEventListener('touchcancel', function(e) {
                    this.classList.remove('pressed');
                }, { passive: true });
            });

            // 占位按钮 —— 延迟弹窗，让特效先显示
            var btn2 = document.getElementById('btn2');
            var btn3 = document.getElementById('btn3');
            var btn4 = document.getElementById('btn4');
            var btn5 = document.getElementById('btn5');

            function delayedAlert(msg) {
                setTimeout(function() { alert(msg); }, 180);
            }

            btn2.addEventListener('click', function(e) {
                e.preventDefault();
                delayedAlert('按钮二功能待添加');
            });
            btn3.addEventListener('click', function(e) {
                e.preventDefault();
                delayedAlert('按钮三功能待添加');
            });
            btn4.addEventListener('click', function(e) {
                e.preventDefault();
                delayedAlert('按钮四功能待添加');
            });
            btn5.addEventListener('click', function(e) {
                e.preventDefault();
                delayedAlert('按钮五功能待添加');
            });
        })();
    </script>
</body>
</html>
