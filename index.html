<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>捂五悟Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 样式完全与之前一致，省略重复部分（与上一版本相同） */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        *:focus, *:focus-visible { outline: none !important; }
        body {
            font-family: 'Quicksand', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: #dce8d5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            padding: 0;
            transition: background-color 0.05s;
        }
        .container { /* ... 与之前相同 ... */ }
        /* ... 所有样式不变 ... */
        .btn {
            /* 与之前相同 */
        }
        .btn-hidden { /* ... */ }
        .btn-hidden.show { /* ... */ }
        /* ... 其他样式不变 ... */
    </style>
</head>
<body>
    <!-- HTML结构不变 -->
    <div class="container fade-in" id="container">
        <div class="title-wrapper">
            <h1 class="main-title">
                <span>捂</span>
                <span>五</span>
                <span class="clickable-悟" id="clickableWu">悟</span>
            </h1>
            <div class="sub">· wu · wu · wu ·</div>
        </div>
        <div class="button-grid" id="buttonGrid">
            <a href="https://woyaojava.github.io/game/" class="btn" id="btn1">游戏</a>
            <a href="https://woyaojava.github.io/leiting/" class="btn" id="btn2">工具</a>
            <a href="#" class="btn" id="btn3">按钮三</a>
            <a href="#" class="btn" id="btn4">按钮四</a>
            <a href="#" class="btn" id="btn5">按钮五</a>
            <a href="https://github.com/woyaojava/woyaojava.github.io" class="btn btn-hidden" id="btn6">代码（史山）</a>
        </div>
    </div>
    <div id="poop-container"></div>
    <div class="footer-credit">Powered by DeepSeek</div>

    <script>
        (function() {
            // ---- 原有脚本（淡入、彩蛋、按钮特效、占位、💩物理）保持不变 ----
            var container = document.getElementById('container');
            container.classList.remove('shifted');
            window.addEventListener('load', function() {
                setTimeout(function() { container.classList.add('shifted'); }, 500);
            });

            // 彩蛋、按钮特效、占位等（与之前完全一致）
            // ... 省略重复代码 ...

            // ---- 彩色模式 ----
            function isColourfulMode() {
                return new URLSearchParams(window.location.search).has('colourful');
            }

            if (isColourfulMode()) {
                document.body.classList.add('colourful');

                // 闪烁颜色
                var colorPalette = ['#ff1744', '#ff9100', '#ffea00', '#00e676', '#2979ff', '#d500f9', '#ff4081', '#00bcd4'];
                function randomColor() {
                    return colorPalette[Math.floor(Math.random() * colorPalette.length)];
                }
                setInterval(function() {
                    document.body.style.backgroundColor = randomColor();
                    document.querySelectorAll('.main-title span, .sub, .footer-credit').forEach(function(el) {
                        el.style.color = randomColor();
                    });
                    document.querySelectorAll('.btn').forEach(function(el) {
                        el.style.color = randomColor();
                        el.style.borderColor = randomColor();
                    });
                }, 100);

                // 物理浮动
                var elements = document.querySelectorAll('.main-title, .sub, .btn');
                var physData = [];
                elements.forEach(function(el) {
                    physData.push({
                        el: el,
                        phaseX: Math.random() * Math.PI * 2,
                        phaseY: Math.random() * Math.PI * 2,
                        ampX: 4 + Math.random() * 12,
                        ampY: 4 + Math.random() * 12,
                        speedX: 0.6 + Math.random() * 1.8,
                        speedY: 0.6 + Math.random() * 1.8
                    });
                });
                function animatePhysics() {
                    var now = performance.now() / 1000;
                    physData.forEach(function(d) {
                        d.el.style.transform = 'translate(' +
                            (Math.sin(now * d.speedX + d.phaseX) * d.ampX).toFixed(1) + 'px, ' +
                            (Math.cos(now * d.speedY + d.phaseY) * d.ampY).toFixed(1) + 'px)';
                    });
                    requestAnimationFrame(animatePhysics);
                }
                animatePhysics();

                // ★ 只修改“游戏”和“工具”两个按钮的链接，带上 ?colourful
                var internalLinks = document.querySelectorAll('#btn1, #btn2');
                internalLinks.forEach(function(link) {
                    if (link.href && link.href !== '#') {
                        try {
                            var url = new URL(link.href, window.location.origin);
                            url.search = 'colourful';  // 覆盖参数，确保只有 colourf ul
                            link.href = url.toString();
                        } catch(e) {}
                    }
                });
                // 其他按钮（btn3, btn4, btn5, btn6）保持不变
            }
        })();
    </script>
</body>
</html>
