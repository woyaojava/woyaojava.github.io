<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 雷霆翻译器 · 智能增强版</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: #12121a;
            --input-bg: #1a1a26;
            --border: #2a2a3a;
            --gold: #f0c040;
            --gold-bright: #ffd866;
            --gold-glow: #f0c04066;
            --text: #e0e0e0;
            --text-secondary: #a0a0b0;
            --accent: #ff6a3d;
            --lightning: #ffe07a;
            --error: #ff5555;
            --success: #50d890;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, #1a1a35 0%, transparent 70%),
                radial-gradient(ellipse at 80% 20%, #1f1a10 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, #0f0f1a 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            padding: 20px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(1px 1px at 15% 25%, #ffe07a44, transparent),
                radial-gradient(1px 1px at 75% 60%, #ffe07a33, transparent),
                radial-gradient(1px 1px at 35% 70%, #ffe07a22, transparent),
                radial-gradient(1.5px 1.5px at 60% 15%, #ffe07a55, transparent),
                radial-gradient(1px 1px at 85% 40%, #ffe07a33, transparent),
                radial-gradient(1px 1px at 10% 80%, #ffe07a22, transparent),
                radial-gradient(1.5px 1.5px at 45% 35%, #ffe07a44, transparent),
                radial-gradient(1px 1px at 55% 85%, #ffe07a28, transparent),
                radial-gradient(1px 1px at 25% 10%, #ffe07a33, transparent);
            animation: particlesFloat 8s ease-in-out infinite;
        }

        @keyframes particlesFloat {
            0%,
            100% {
                opacity: 0.6;
            }
            25% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
            75% {
                opacity: 0.85;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 820px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow:
                0 0 80px #1a1a3010,
                0 30px 60px #00000050,
                0 0 0 1px var(--border),
                inset 0 1px 0 #ffffff05;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .container:hover {
            box-shadow:
                0 0 100px #1a1a3018,
                0 35px 70px #00000060,
                0 0 0 1px #3a3a4a,
                0 0 40px var(--gold-glow),
                inset 0 1px 0 #ffffff08;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            display: inline-block;
            font-size: 56px;
            animation: thunderShake 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px #ffe07a88);
            line-height: 1;
            cursor: default;
            user-select: none;
        }

        @keyframes thunderShake {
            0%,
            90%,
            100% {
                transform: translateY(0) rotate(0);
            }
            91% {
                transform: translateY(-12px) rotate(-3deg);
            }
            92% {
                transform: translateY(6px) rotate(2deg);
            }
            93% {
                transform: translateY(-4px) rotate(-1deg);
            }
            94% {
                transform: translateY(2px) rotate(0.5deg);
            }
            95% {
                transform: translateY(0) rotate(0);
            }
        }

        .title {
            font-size: 2.2em;
            font-weight: 900;
            letter-spacing: 0.04em;
            margin-top: 4px;
            background: linear-gradient(180deg, #ffe9a0 0%, #f0c040 40%, #c89020 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 8px #f0c04055);
        }

        .subtitle {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 2px;
            letter-spacing: 0.06em;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 110px;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 16px 18px;
            font-size: 1.05em;
            color: var(--text);
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'PingFang SC', 'Microsoft YaHei', monospace;
            resize: vertical;
            transition: all 0.3s ease;
            line-height: 1.6;
            letter-spacing: 0.02em;
        }

        textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 30px var(--gold-glow), 0 0 0 4px #f0c04015;
            background: #1e1e2c;
        }

        textarea::placeholder {
            color: #555;
            font-style: italic;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn-translate {
            background: linear-gradient(135deg, #f0c040 0%, #d4a020 50%, #b88018 100%);
            color: #1a1a0a;
            flex: 1;
            min-width: 160px;
            box-shadow: 0 8px 30px #f0c04030;
            font-size: 1.1em;
        }
        .btn-translate:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px #f0c04050, 0 0 60px #f0c04025;
            background: linear-gradient(135deg, #ffd866 0%, #e8b830 50%, #c89020 100%);
        }
        .btn-translate:active {
            transform: translateY(0) scale(0.96);
            box-shadow: 0 4px 15px #f0c04030;
            transition: all 0.08s ease;
        }
        .btn-translate::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #ffffff60 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .btn-translate:hover::after {
            opacity: 0.25;
        }

        .btn-clear {
            background: transparent;
            border: 2px solid #3a3a4a;
            color: var(--text-secondary);
            box-shadow: none;
        }
        .btn-clear:hover {
            border-color: #5a5a6a;
            color: #fff;
            background: #ffffff06;
        }
        .btn-clear:active {
            background: #ffffff10;
            transform: scale(0.96);
        }

        .btn-example {
            background: transparent;
            border: 2px solid #2a2a3a;
            color: #888;
            font-size: 0.8em;
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn-example:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: #f0c04008;
            box-shadow: 0 0 16px #f0c04015;
        }

        .example-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            justify-content: center;
        }

        .result-area {
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 20px 22px;
            min-height: 60px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .result-area.has-result {
            border-color: #3a3a4a;
            background: #161622;
            box-shadow: 0 0 30px #f0c04010;
        }
        .result-area.flash {
            animation: resultFlash 0.6s ease-out;
        }
        @keyframes resultFlash {
            0% {
                box-shadow: 0 0 60px #ffe07a60, 0 0 0 6px #f0c04030;
                border-color: #ffe07a;
            }
            100% {
                box-shadow: 0 0 30px #f0c04010;
                border-color: #3a3a4a;
            }
        }

        .result-label {
            font-size: 0.75em;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .result-label .icon {
            font-size: 1.2em;
        }

        .result-text {
            font-size: 1.25em;
            font-weight: 600;
            color: #fff;
            line-height: 1.7;
            letter-spacing: 0.03em;
            word-break: break-word;
        }

        .result-detail {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #2a2a3a;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .word-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #1e1e2e;
            border: 1px solid #2a2a3a;
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 0.82em;
            transition: all 0.2s ease;
        }
        .word-chip .eng {
            color: #ccc;
            font-weight: 500;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        .word-chip .arrow {
            color: #666;
            margin: 0 2px;
            font-size: 0.8em;
        }
        .word-chip .chn {
            color: var(--gold);
            font-weight: 700;
        }
        .word-chip.not-found {
            opacity: 0.55;
            border-style: dashed;
        }
        .word-chip.not-found .chn {
            color: #ff8888;
        }
        .word-chip.split {
            border-color: #f0c04055;
            background: #1e1e2e;
        }
        .word-chip.split .eng {
            color: #ffd866;
        }
        .word-chip.split .chn {
            color: #50d890;
        }
        .word-chip.fuzzy {
            border-color: #6a5acd88;
            background: #1a1a2e;
        }
        .word-chip.fuzzy .eng {
            color: #b0a0ff;
        }
        .word-chip.fuzzy .chn {
            color: #b0a0ff;
        }
        .word-chip .badge {
            font-size: 0.6em;
            background: #333;
            padding: 0 5px;
            border-radius: 4px;
            color: #aaa;
            margin-left: 2px;
        }

        .empty-result {
            color: #444;
            text-align: center;
            font-style: italic;
            padding: 10px 0;
            font-size: 0.95em;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75em;
            color: #444;
            letter-spacing: 0.03em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px 18px;
                border-radius: 18px;
            }
            .title {
                font-size: 1.6em;
            }
            .logo-icon {
                font-size: 40px;
            }
            textarea {
                min-height: 90px;
                font-size: 0.95em;
                padding: 14px;
            }
            .btn-translate {
                font-size: 1em;
                padding: 12px 20px;
            }
            .btn {
                padding: 10px 18px;
                font-size: 0.9em;
            }
            .result-text {
                font-size: 1.05em;
            }
            .word-chip {
                font-size: 0.72em;
                padding: 4px 7px;
            }
        }

</head>

            // ==================== 词形还原 ====================
            function tryReduceWord(word) {
                const w = word.toLowerCase();
                if (DICTIONARY[w] !== undefined) return w;

                // -ing
                if (w.endsWith('ing') && w.length > 4) {
                    let stem = w.slice(0, -3);
                    if (DICTIONARY[stem] !== undefined) return stem;
                    if (stem.length >= 3 && stem[stem.length - 1] === stem[stem.length - 2]) {
                        let stem2 = stem.slice(0, -1);
                        if (DICTIONARY[stem2] !== undefined) return stem2;
                    }
                    let stemE = stem + 'e';
                    if (DICTIONARY[stemE] !== undefined) return stemE;
                }

                // -ed
                if (w.endsWith('ed') && w.length > 4) {
                    let stem = w.slice(0, -2);
                    if (DICTIONARY[stem] !== undefined) return stem;
                    let stemD = w.slice(0, -1);
                    if (DICTIONARY[stemD] !== undefined) return stemD;
                    if (stem.length >= 3 && stem[stem.length - 1] === stem[stem.length - 2]) {
                        let stem2 = stem.slice(0, -1);
                        if (DICTIONARY[stem2] !== undefined) return stem2;
                    }
                }

                // -s
                if (w.endsWith('s') && w.length > 3 && !w.endsWith('ss') && !w.endsWith('us')) {
                    let stem = w.slice(0, -1);
                    if (DICTIONARY[stem] !== undefined) return stem;
                }

                // -es
                if (w.endsWith('es') && w.length > 4) {
                    let stem = w.slice(0, -2);
                    if (DICTIONARY[stem] !== undefined) return stem;
                    if (w.endsWith('ies') && w.length > 4) {
                        let stemY = w.slice(0, -3) + 'y';
                        if (DICTIONARY[stemY] !== undefined) return stemY;
                    }
                }

                // -ly
                if (w.endsWith('ly') && w.length > 4) {
                    let stem = w.slice(0, -2);
                    if (DICTIONARY[stem] !== undefined) return stem;
                    if (w.endsWith('ily') && w.length > 4) {
                        let stemY = w.slice(0, -3) + 'y';
                        if (DICTIONARY[stemY] !== undefined) return stemY;
                    }
                }

                // -er
                if (w.endsWith('er') && w.length > 4) {
                    let stem = w.slice(0, -2);
                    if (DICTIONARY[stem] !== undefined) return stem;
                    if (w.endsWith('ier') && w.length > 4) {
                        let stemY = w.slice(0, -3) + 'y';
                        if (DICTIONARY[stemY] !== undefined) return stemY;
                    }
                }

                // -est
                if (w.endsWith('est') && w.length > 5) {
                    let stem = w.slice(0, -3);
                    if (DICTIONARY[stem] !== undefined) return stem;
                    if (w.endsWith('iest') && w.length > 5) {
                        let stemY = w.slice(0, -4) + 'y';
                        if (DICTIONARY[stemY] !== undefined) return stemY;
                    }
                }

                // -tion -> -t
                if (w.endsWith('tion') && w.length > 5) {
                    let stem = w.slice(0, -4) + 't';
                    if (DICTIONARY[stem] !== undefined) return stem;
                }

                // -ive -> -e
                if (w.endsWith('ive') && w.length > 4) {
                    let stem = w.slice(0, -3) + 'e';
                    if (DICTIONARY[stem] !== undefined) return stem;
                }

                // -ment -> 
                if (w.endsWith('ment') && w.length > 5) {
                    let stem = w.slice(0, -4);
                    if (DICTIONARY[stem] !== undefined) return stem;
                }

                return null;
            }

            // ==================== 复合词拆分 ====================
            function splitCompound(word, maxDepth) {
                maxDepth = maxDepth || 3;
                const w = word.toLowerCase();

                if (DICTIONARY[w] !== undefined) {
                    return { parts: [w], found: true };
                }

                if (maxDepth <= 0) return null;

                // 贪心拆分：从左边开始找最长的已知词
                for (let i = w.length - 1; i >= 1; i--) {
                    let prefix = w.slice(0, i);
                    let suffix = w.slice(i);

                    if (DICTIONARY[prefix] !== undefined) {
                        let suffixResult = splitCompound(suffix, maxDepth - 1);
                        if (suffixResult && suffixResult.found) {
                            return { parts: [prefix, ...suffixResult.parts], found: true };
                        }
                    }
                }

                // 尝试从右边拆分
                for (let i = 1; i < w.length; i++) {
                    let prefix = w.slice(0, i);
                    let suffix = w.slice(i);

                    if (DICTIONARY[suffix] !== undefined) {
                        let prefixResult = splitCompound(prefix, maxDepth - 1);
                        if (prefixResult && prefixResult.found) {
                            return { parts: [...prefixResult.parts, suffix], found: true };
                        }
                    }
                }

                return null;
            }

            // ==================== 重叠匹配 (70% 规则) ====================
            function lcsLength(a, b) {
                const m = a.length,
                    n = b.length;
                const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
                for (let i = 1; i <= m; i++) {
                    for (let j = 1; j <= n; j++) {
                        if (a[i - 1] === b[j - 1]) {
                            dp[i][j] = dp[i - 1][j - 1] + 1;
                        } else {
                            dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                        }
                    }
                }
                return dp[m][n];
            }

            function fuzzyMatch(word) {
                const w = word.toLowerCase();
                if (w.length < 3) return null;

                // 先尝试词形还原
                let reduced = tryReduceWord(w);
                if (reduced && DICTIONARY[reduced] !== undefined) {
                    return { matched: reduced, translation: DICTIONARY[reduced], method: 'reduced' };
                }

                // 尝试复合词拆分
                let splitResult = splitCompound(w, 3);
                if (splitResult && splitResult.found) {
                    let translations = splitResult.parts.map(p => DICTIONARY[p] || p);
                    let combined = translations.join(' ');
                    return { matched: splitResult.parts.join('+'), translation: combined, method: 'split', parts: splitResult
                            .parts };
                }

                // 模糊匹配：遍历词典找 LCS >= 70%
                let bestMatch = null;
                let bestScore = 0;
                const threshold = 0.7;

                for (let key in DICTIONARY) {
                    if (Math.abs(key.length - w.length) > 3) continue;
                    const lcs = lcsLength(w, key);
                    const score = lcs / Math.max(w.length, key.length);
                    if (score > bestScore && score >= threshold) {
                        bestScore = score;
                        bestMatch = key;
                    }
                }

                if (bestMatch) {
                    return { matched: bestMatch, translation: DICTIONARY[bestMatch], method: 'fuzzy', score: bestScore };
                }

                return null;
            }

            // ==================== 查词核心 ====================
            function lookupWord(word) {
                const lower = word.toLowerCase();

                // 直接查
                if (DICTIONARY[lower] !== undefined) {
                    return { found: true, translation: DICTIONARY[lower], matchedForm: lower, method: 'exact' };
                }

                // 词形还原
                const reduced = tryReduceWord(lower);
                if (reduced && DICTIONARY[reduced] !== undefined) {
                    return { found: true, translation: DICTIONARY[reduced], matchedForm: reduced, method: 'reduced' };
                }

                // 复合拆分 + 模糊匹配
                const fuzzy = fuzzyMatch(lower);
                if (fuzzy) {
                    if (fuzzy.method === 'split') {
                        return {
                            found: true,
                            translation: fuzzy.translation,
                            matchedForm: fuzzy.matched,
                            method: 'split',
                            parts: fuzzy.parts
                        };
                    } else {
                        return {
                            found: true,
                            translation: fuzzy.translation,
                            matchedForm: fuzzy.matched,
                            method: fuzzy.method,
                            score: fuzzy.score
                        };
                    }
                }

                return { found: false, translation: word, matchedForm: null, method: 'unknown' };
            }

            // ==================== 翻译句子 ====================
            function translateSentence(sentence) {
                let expanded = sentence;
                expanded = expanded.replace(/[a-zA-Z]+(?:'[a-zA-Z]+)?/g, (match) => {
                    const lower = match.toLowerCase();
                    if (CONTRACTION_MAP[lower]) {
                        return CONTRACTION_MAP[lower];
                    }
                    return match;
                });

                const tokens = [];
                const regex = /[a-zA-Z]+(?:'[a-zA-Z]+)?|[^a-zA-Z\s]+|\s+/g;
                let m;
                while ((m = regex.exec(expanded)) !== null) {
                    const token = m[0];
                    if (/^\s+$/.test(token)) {
                        tokens.push({ type: 'space', value: token });
                    } else if (/^[a-zA-Z]+(?:'[a-zA-Z]+)?$/.test(token)) {
                        tokens.push({ type: 'word', value: token });
                    } else {
                        tokens.push({ type: 'punct', value: token });
                    }
                }

                const wordDetails = [];
                const translatedTokens = tokens.map(tok => {
                    if (tok.type === 'word') {
                        const result = lookupWord(tok.value);
                        let displayTranslation = result.translation;
                        let method = result.method || 'unknown';
                        let parts = result.parts || null;

                        wordDetails.push({
                            original: tok.value,
                            translation: displayTranslation,
                            found: result.found,
                            method: method,
                            parts: parts,
                            matchedForm: result.matchedForm || null,
                        });
                        return { ...tok, translation: displayTranslation, found: result.found, method: method };
                    } else {
                        return { ...tok, translation: tok.value, found: true, method: 'punct' };
                    }
                });

                let resultText = '';
                for (const tok of translatedTokens) {
                    if (tok.type === 'space') {
                        resultText += tok.value;
                    } else if (tok.type === 'punct') {
                        if (resultText.endsWith(' ') && /^[.,!?;:)\]}"']/.test(tok.value)) {
                            resultText = resultText.slice(0, -1);
                        }
                        resultText += tok.value;
                    } else {
                        resultText += tok.translation;
                    }
                }
                resultText = resultText.replace(/\s+/g, ' ').trim();
                resultText = resultText.replace(/\s+([.,!?;:)\]}"'])/g, '$1');
                resultText = resultText.replace(/([\[({"'"])\s+/g, '$1');

                return { resultText, wordDetails, expandedSentence: expanded };
            }

            // ==================== UI ====================
            const inputText = document.getElementById('inputText');
            const btnTranslate = document.getElementById('btnTranslate');
            const btnClear = document.getElementById('btnClear');
            const resultContent = document.getElementById('resultContent');
            const resultDetail = document.getElementById('resultDetail');
            const resultArea = document.getElementById('resultArea');
            const exampleRow = document.getElementById('exampleRow');

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getMethodLabel(method) {
                const map = {
                    'exact': '✓',
                    'reduced': '↻',
                    'split': '✧',
                    'fuzzy': '~',
                    'unknown': '?',
                    'punct': '·'
                };
                return map[method] || '·';
            }

            function doTranslate() {
                const sentence = inputText.value.trim();
                if (!sentence) {
                    resultContent.innerHTML = '<span class="empty-result">请输入英文句子</span>';
                    resultContent.className = 'empty-result';
                    resultDetail.style.display = 'none';
                    resultArea.classList.remove('has-result', 'flash');
                    return;
                }

                const { resultText, wordDetails } = translateSentence(sentence);

                resultContent.textContent = resultText;
                resultContent.className = 'result-text';
                resultArea.classList.add('has-result');
                resultArea.classList.remove('flash');
                void resultArea.offsetWidth;
                resultArea.classList.add('flash');

                if (wordDetails.length > 0) {
                    let detailHTML = '';
                    for (const wd of wordDetails) {
                        let chipClass = 'word-chip';
                        if (!wd.found) chipClass += ' not-found';
                        else if (wd.method === 'split') chipClass += ' split';
                        else if (wd.method === 'fuzzy') chipClass += ' fuzzy';

                        let badge = getMethodLabel(wd.method);
                        let engDisplay = wd.original;
                        if (wd.matchedForm && wd.method !== 'exact' && wd.method !== 'unknown') {
                            engDisplay = wd.original + ' <span style="font-size:0.6em;color:#888;">→' + wd.matchedForm +
                                '</span>';
                        }
                        if (wd.method === 'split' && wd.parts) {
                            engDisplay = wd.original + ' <span style="font-size:0.6em;color:#888;">(' + wd.parts.join('+') +
                                ')</span>';
                        }
                        detailHTML +=
                            `<span class="${chipClass}"><span class="eng">${escapeHTML(engDisplay)}</span><span class="arrow">→</span><span class="chn">${escapeHTML(wd.translation)}</span><span class="badge">${badge}</span></span>`;
                    }
                    resultDetail.innerHTML = detailHTML;
                    resultDetail.style.display = 'flex';
                } else {
                    resultDetail.style.display = 'none';
                }
            }

            btnTranslate.addEventListener('click', doTranslate);

            btnClear.addEventListener('click', () => {
                inputText.value = '';
                resultContent.innerHTML = '<span class="empty-result">等待输入…</span>';
                resultContent.className = 'empty-result';
                resultDetail.style.display = 'none';
                resultDetail.innerHTML = '';
                resultArea.classList.remove('has-result', 'flash');
                inputText.focus();
            });

            inputText.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    doTranslate();
                }
            });

            exampleRow.addEventListener('click', (e) => {
                const btn = e.target.closest('.btn-example');
                if (!btn) return;
                const text = btn.getAttribute('data-text');
                if (text) {
                    inputText.value = text;
                    doTranslate();
                    resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });

            setTimeout(() => {
                if (inputText.value.trim()) {
                    doTranslate();
                }
            }, 300);

            console.log('⚡ 雷霆翻译器·智能增强版已就绪！');
            console.log('  词典词条数：' + Object.keys(DICTIONARY).length);
            console.log('  支持：词形还原 · 复合拆分 · 模糊匹配(70%重叠)');
            console.log('  快捷键：Ctrl+Enter 翻译');
            console.log('  示例：DeepSeek → 深的寻找 (拆分翻译)');
        })();
