<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>镜像一键生成器</title>
    <!-- JSZip CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>
    <style>
        /* 【彻底消灭蓝框策略】 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            box-shadow: none !important;
        }
        button:focus,
        input:focus,
        select:focus,
        textarea:focus,
        canvas:focus,
        a:focus {
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            box-shadow: none !important;
        }
        input,
        button,
        select {
            -webkit-appearance: none;
            appearance: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.8s ease;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .container {
            width: 100%;
            max-width: 720px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            padding: 28px 28px 32px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            margin-top: 10px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 22px;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ---- 上传区 ---- */
        .upload-box {
            position: relative;
            border: 2px dashed rgba(0, 0, 0, 0.13);
            padding: 30px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: 0.25s;
            margin-bottom: 18px;
        }
        .upload-box:hover {
            border-color: #ff6b6b;
            background: rgba(255, 245, 245, 0.5);
        }
        .upload-box.dragover {
            border-color: #ff5252;
            background: rgba(255, 245, 245, 0.7);
            transform: scale(1.01);
        }
        .upload-box input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 10;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }
        .upload-icon {
            font-size: 36px;
            margin-bottom: 4px;
            pointer-events: none;
        }
        .upload-box>div {
            pointer-events: none;
            color: #1f2937;
            font-weight: 500;
        }

        /* ---- 工具栏 ---- */
        .toolbar {
            display: none;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px 12px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .toolbar.active {
            display: flex;
        }
        .toolbar .count {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
            margin-right: 4px;
        }
        .toolbar .spacer {
            flex: 1;
        }
        .toolbar .dir-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .toolbar .dir-btn {
            padding: 5px 12px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #4b5563;
            transition: 0.15s;
            outline: none !important;
            box-shadow: none !important;
        }
        .toolbar .dir-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
        }
        .toolbar .dir-btn.active {
            border-color: #ff5252;
            background: #fff5f5;
            color: #ff5252;
            box-shadow: 0 0 0 2px rgba(255, 82, 82, 0.15) !important;
        }
        .toolbar .btn-clear {
            padding: 5px 14px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 13px;
            color: #6b7280;
            transition: 0.15s;
            outline: none !important;
            box-shadow: none !important;
        }
        .toolbar .btn-clear:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* ---- 文件列表 ---- */
        .file-list {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .file-list.active {
            display: flex;
        }
        .file-list::-webkit-scrollbar {
            width: 4px;
        }
        .file-list::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px 8px 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: 0.15s;
            cursor: pointer;
        }
        .file-item:hover {
            background: rgba(255, 255, 255, 0.75);
        }
        .file-item.active {
            border-color: #ff5252;
            background: rgba(255, 245, 245, 0.7);
            box-shadow: 0 0 0 2px rgba(255, 82, 82, 0.08) !important;
        }
        .file-item .thumb {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f3f4f6;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        .file-item .info {
            flex: 1;
            min-width: 0;
            text-align: left;
        }
        .file-item .info .name {
            font-size: 13px;
            font-weight: 500;
            color: #1f2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-item .info .size {
            font-size: 11px;
            color: #9ca3af;
        }
        .file-item .dir-select {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .file-item .dir-select .dbtn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            transition: 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none !important;
            box-shadow: none !important;
            line-height: 1;
        }
        .file-item .dir-select .dbtn:hover {
            background: #ffffff;
        }
        .file-item .dir-select .dbtn.active {
            border-color: #ff5252;
            background: #fff5f5;
            color: #ff5252;
            box-shadow: 0 0 0 2px rgba(255, 82, 82, 0.12) !important;
        }
        .file-item .btn-del {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            color: #9ca3af;
            transition: 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none !important;
            box-shadow: none !important;
            flex-shrink: 0;
        }
        .file-item .btn-del:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* ---- 预览区 ---- */
        #previewArea {
            display: none;
            margin-top: 6px;
            background: rgba(241, 245, 249, 0.25);
            padding: 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        #previewArea.active {
            display: block;
        }

        canvas {
            max-width: 100%;
            max-height: 380px;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            margin: 0 auto;
            display: block;
        }

        .action-row {
            display: none;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
            margin-top: 16px;
            width: 100%;
        }
        .action-row.active {
            display: flex;
        }

        .direction-group {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            width: 100%;
        }
        .direction-group .dir-btn {
            flex: 1;
            padding: 9px 0;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #4b5563;
            transition: 0.15s;
            text-align: center;
            outline: none !important;
            box-shadow: none !important;
        }
        .direction-group .dir-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
        }
        .direction-group .dir-btn.active {
            border-color: #ff5252;
            background: #fff5f5;
            color: #ff5252;
            box-shadow: 0 0 0 2px rgba(255, 82, 82, 0.12) !important;
        }

        .format-download-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            width: 100%;
        }
        .select-wrapper {
            position: relative;
            display: inline-block;
            flex: 1;
            min-width: 90px;
            max-width: 160px;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 11px;
            color: #9ca3af;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
        .select-wrapper select {
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.06);
            padding: 9px 30px 9px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            color: #1f2937;
            cursor: pointer;
            transition: 0.15s;
            outline: none !important;
            box-shadow: none !important;
        }
        .select-wrapper select:focus {
            border-color: #ff5252;
            background: #fffafa;
        }

        .btn-download {
            flex: 1;
            min-width: 100px;
            background: #ff5252;
            color: #ffffff;
            border: none;
            padding: 9px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            outline: none !important;
            box-shadow: none !important;
        }
        .btn-download:hover {
            background: #e04848;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 82, 82, 0.25) !important;
        }
        .btn-download:active {
            transform: scale(0.96);
        }
        .btn-download:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none !important;
        }

        /* ---- 批量导出区 ---- */
        .batch-area {
            display: none;
            margin-top: 18px;
            padding: 16px 18px 18px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 14px;
        }
        .batch-area.active {
            display: flex;
        }
        .batch-area .spacer {
            flex: 1;
        }
        .batch-area .select-wrapper {
            max-width: 140px;
            min-width: 80px;
        }
        .batch-area .select-wrapper select {
            padding: 8px 28px 8px 10px;
            font-size: 13px;
        }
        .btn-batch {
            background: #1a1a2e;
            color: #ffffff;
            border: none;
            padding: 9px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            outline: none !important;
            box-shadow: none !important;
            white-space: nowrap;
        }
        .btn-batch:hover {
            background: #2d2d4a;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(26, 26, 46, 0.25) !important;
        }
        .btn-batch:active {
            transform: scale(0.96);
        }
        .btn-batch:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none !important;
        }

        .batch-progress {
            display: none;
            width: 100%;
            margin-top: 8px;
            font-size: 13px;
            color: #4b5563;
            text-align: center;
            font-weight: 500;
        }
        .batch-progress.active {
            display: block;
        }
        .batch-progress .bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 6px;
        }
        .batch-progress .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff5252, #f093fb);
            border-radius: 10px;
            transition: width 0.25s ease;
        }
        .batch-progress .status-text {
            margin-top: 4px;
        }

        /* ---- 空状态 ---- */
        .empty-tip {
            color: #9ca3af;
            font-size: 14px;
            padding: 18px 0 8px;
        }

        /* ---- 自定义确认弹窗 ---- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 32px 28px 28px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .modal-box .modal-icon {
            font-size: 40px;
            margin-bottom: 6px;
        }
        .modal-box .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 6px;
        }
        .modal-box .modal-message {
            font-size: 15px;
            color: #4b5563;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal-box .modal-actions button {
            flex: 1;
            padding: 10px 0;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
            outline: none !important;
            box-shadow: none !important;
            min-width: 80px;
        }
        .modal-box .modal-actions .btn-cancel {
            background: rgba(0, 0, 0, 0.06);
            color: #4b5563;
        }
        .modal-box .modal-actions .btn-cancel:hover {
            background: rgba(0, 0, 0, 0.12);
        }
        .modal-box .modal-actions .btn-confirm {
            background: #ff5252;
            color: #fff;
        }
        .modal-box .modal-actions .btn-confirm:hover {
            background: #e04848;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 82, 82, 0.3) !important;
        }

        /* ---- 响应式 ---- */
        @media (max-width: 540px) {
            .container {
                padding: 18px 14px 22px;
            }
            h1 {
                font-size: 20px;
            }
            .upload-box {
                padding: 20px 12px;
            }
            .upload-icon {
                font-size: 28px;
            }
            .file-item {
                padding: 6px 8px;
                gap: 6px;
            }
            .file-item .thumb {
                width: 36px;
                height: 36px;
            }
            .file-item .dir-select .dbtn {
                width: 24px;
                height: 24px;
                font-size: 11px;
            }
            .file-item .btn-del {
                width: 24px;
                height: 24px;
                font-size: 15px;
            }
            .toolbar {
                padding: 8px 10px;
                gap: 6px 8px;
            }
            .toolbar .dir-btn {
                font-size: 12px;
                padding: 4px 10px;
            }
            .direction-group .dir-btn {
                font-size: 12px;
                padding: 7px 0;
            }
            .batch-area {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .batch-area .spacer {
                display: none;
            }
            .batch-area .select-wrapper {
                max-width: 100%;
            }
            .btn-batch {
                width: 100%;
                justify-content: center;
            }
            .format-download-row .select-wrapper {
                max-width: 120px;
                min-width: 70px;
            }
            .format-download-row .btn-download {
                min-width: 80px;
                font-size: 13px;
                padding: 8px 14px;
            }
            #previewArea {
                padding: 10px;
            }
            canvas {
                max-height: 260px;
            }
            .modal-box {
                padding: 24px 18px 20px;
            }
        }

        @media (max-width: 400px) {
            .file-item .dir-select .dbtn {
                width: 20px;
                height: 20px;
                font-size: 10px;
            }
            .file-item .info .name {
                font-size: 11px;
            }
            .toolbar .dir-btn {
                font-size: 11px;
                padding: 3px 8px;
            }
            .direction-group .dir-btn {
                font-size: 11px;
                padding: 5px 0;
            }
        }
    </style>
</head>
<body>
    <!-- 自定义确认弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title" id="modalTitle">确认</div>
            <div class="modal-message" id="modalMessage">确定执行此操作吗？</div>
            <div class="modal-actions">
                <button class="btn-cancel" id="modalCancel">取消</button>
                <button class="btn-confirm" id="modalConfirm">确定</button>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>🪞 镜像一键生成器</h1>

        <!-- 上传区 -->
        <div class="upload-box" id="dropZone">
            <div class="upload-icon">☁️</div>
            <div>点击上传 或 拖拽图片至此</div>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar" id="toolbar">
            <span class="count" id="fileCount">📎 0 个文件</span>
            <div class="spacer"></div>
            <div class="dir-group">
                <button class="dir-btn active" data-dir="left">←</button>
                <button class="dir-btn" data-dir="right">→</button>
                <button class="dir-btn" data-dir="top">↑</button>
                <button class="dir-btn" data-dir="bottom">↓</button>
            </div>
            <button class="btn-clear" id="clearAllBtn">清空</button>
        </div>

        <!-- 文件列表 -->
        <div class="file-list" id="fileList"></div>
        <div class="empty-tip" id="emptyTip">暂无图片，请上传</div>

        <!-- 预览区 -->
        <div id="previewArea">
            <canvas id="outputCanvas"></canvas>

            <div class="action-row" id="actionRow">
                <div class="direction-group" id="directionGroup">
                    <button class="dir-btn active" data-dir="left">← 左</button>
                    <button class="dir-btn" data-dir="right">右 →</button>
                    <button class="dir-btn" data-dir="top">↑ 上</button>
                    <button class="dir-btn" data-dir="bottom">下 ↓</button>
                </div>

                <div class="format-download-row">
                    <div class="select-wrapper">
                        <select id="formatSelect">
                            <option value="original">原格式</option>
                            <option value="png">PNG</option>
                            <option value="jpeg">JPG</option>
                            <option value="webp">WEBP</option>
                        </select>
                    </div>
                    <button class="btn-download" id="downloadBtn">下载当前</button>
                </div>
            </div>
        </div>

        <!-- 批量导出区 -->
        <div class="batch-area" id="batchArea">
            <div class="select-wrapper">
                <select id="batchFormatSelect">
                    <option value="original">原格式</option>
                    <option value="png">PNG</option>
                    <option value="jpeg">JPG</option>
                    <option value="webp">WEBP</option>
                </select>
            </div>
            <div class="spacer"></div>
            <button class="btn-batch" id="batchBtn">⬇ 导出全部 ZIP</button>
            <div class="batch-progress" id="batchProgress">
                <div class="bar-bg"><div class="bar-fill" id="progressFill"></div></div>
                <div class="status-text" id="progressText">准备中...</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ==========================================
            // 1. 全随机渐变色背景
            // ==========================================
            function getRandomHSL() {
                const hue = Math.floor(Math.random() * 360);
                const saturation = Math.floor(Math.random() * 40) + 60;
                const lightness = Math.floor(Math.random() * 30) + 50;
                return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            }
            document.body.style.background =
                `linear-gradient(135deg, ${getRandomHSL()}, ${getRandomHSL()})`;

            // ==========================================
            // 2. DOM 引用
            // ==========================================
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const canvas = document.getElementById('outputCanvas');
            const ctx = canvas.getContext('2d');
            const previewArea = document.getElementById('previewArea');
            const actionRow = document.getElementById('actionRow');
            const formatSelect = document.getElementById('formatSelect');
            const downloadBtn = document.getElementById('downloadBtn');
            const directionBtns = document.querySelectorAll('#directionGroup .dir-btn');
            const fileList = document.getElementById('fileList');
            const emptyTip = document.getElementById('emptyTip');
            const toolbar = document.getElementById('toolbar');
            const fileCount = document.getElementById('fileCount');
            const clearAllBtn = document.getElementById('clearAllBtn');
            const batchArea = document.getElementById('batchArea');
            const batchBtn = document.getElementById('batchBtn');
            const batchFormatSelect = document.getElementById('batchFormatSelect');
            const batchProgress = document.getElementById('batchProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const toolDirBtns = document.querySelectorAll('#toolbar .dir-btn');

            // 自定义弹窗元素
            const modalOverlay = document.getElementById('confirmModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalConfirm = document.getElementById('modalConfirm');
            const modalCancel = document.getElementById('modalCancel');
            let modalResolve = null; // 用于 resolve Promise

            // ==========================================
            // 3. 自定义确认弹窗函数 (Promise)
            // ==========================================
            function showConfirm(message, title = '确认') {
                return new Promise((resolve) => {
                    modalTitle.textContent = title;
                    modalMessage.textContent = message;
                    modalOverlay.classList.add('active');
                    // 存储 resolve 以便按钮调用
                    modalResolve = resolve;
                });
            }

            // 绑定弹窗按钮事件
            modalConfirm.addEventListener('click', function() {
                modalOverlay.classList.remove('active');
                if (modalResolve) {
                    modalResolve(true);
                    modalResolve = null;
                }
            });
            modalCancel.addEventListener('click', function() {
                modalOverlay.classList.remove('active');
                if (modalResolve) {
                    modalResolve(false);
                    modalResolve = null;
                }
            });
            // 点击外部关闭（可选，但为了符合习惯，我们允许点击背景关闭视为取消）
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('active');
                    if (modalResolve) {
                        modalResolve(false);
                        modalResolve = null;
                    }
                }
            });

            // ==========================================
            // 4. 数据结构
            // ==========================================
            let fileItems = []; // { id, file, image, direction, blobUrl }
            let selectedId = null; // 当前选中文件的 id
            let isProcessing = false;

            // 方向映射
            const DIR_MAP = {
                left: 'l',
                right: 'r',
                top: 'u',
                bottom: 'd'
            };
            const DIR_LABEL = {
                left: '←左',
                right: '右→',
                top: '↑上',
                bottom: '下↓'
            };

            // ==========================================
            // 5. 核心：镜像算法
            // ==========================================
            function applyMirrorToCanvas(img, direction) {
                const w = img.width;
                const h = img.height;
                let halfW, halfH, newW, newH;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (direction === 'left') {
                    halfW = Math.ceil(w / 2);
                    newW = halfW * 2;
                    newH = h;
                    canvas.width = newW;
                    canvas.height = newH;
                    ctx.drawImage(img, 0, 0, halfW, h, 0, 0, halfW, h);
                    ctx.save();
                    ctx.translate(newW, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(img, 0, 0, halfW, h, 0, 0, halfW, h);
                    ctx.restore();
                } else if (direction === 'right') {
                    halfW = Math.ceil(w / 2);
                    newW = halfW * 2;
                    newH = h;
                    canvas.width = newW;
                    canvas.height = newH;
                    ctx.drawImage(img, w - halfW, 0, halfW, h, newW - halfW, 0, halfW, h);
                    ctx.save();
                    ctx.scale(-1, 1);
                    ctx.drawImage(img, w - halfW, 0, halfW, h, -(newW - halfW), 0, halfW, h);
                    ctx.restore();
                } else if (direction === 'top') {
                    halfH = Math.ceil(h / 2);
                    newW = w;
                    newH = halfH * 2;
                    canvas.width = newW;
                    canvas.height = newH;
                    ctx.drawImage(img, 0, 0, w, halfH, 0, 0, w, halfH);
                    ctx.save();
                    ctx.translate(0, newH);
                    ctx.scale(1, -1);
                    ctx.drawImage(img, 0, 0, w, halfH, 0, 0, w, halfH);
                    ctx.restore();
                } else if (direction === 'bottom') {
                    halfH = Math.ceil(h / 2);
                    newW = w;
                    newH = halfH * 2;
                    canvas.width = newW;
                    canvas.height = newH;
                    ctx.drawImage(img, 0, h - halfH, w, halfH, 0, newH - halfH, w, halfH);
                    ctx.save();
                    ctx.scale(1, -1);
                    ctx.drawImage(img, 0, h - halfH, w, halfH, 0, -(newH - halfH), w, halfH);
                    ctx.restore();
                }
            }

            // 生成镜像 Blob (独立处理，不干扰主canvas)
            function generateMirrorBlob(img, direction, mimeType, quality) {
                return new Promise((resolve, reject) => {
                    try {
                        const w = img.width;
                        const h = img.height;
                        let halfW, halfH, newW, newH;

                        // 使用离屏 canvas
                        const offCanvas = document.createElement('canvas');
                        const offCtx = offCanvas.getContext('2d');

                        if (direction === 'left') {
                            halfW = Math.ceil(w / 2);
                            newW = halfW * 2;
                            newH = h;
                            offCanvas.width = newW;
                            offCanvas.height = newH;
                            offCtx.drawImage(img, 0, 0, halfW, h, 0, 0, halfW, h);
                            offCtx.save();
                            offCtx.translate(newW, 0);
                            offCtx.scale(-1, 1);
                            offCtx.drawImage(img, 0, 0, halfW, h, 0, 0, halfW, h);
                            offCtx.restore();
                        } else if (direction === 'right') {
                            halfW = Math.ceil(w / 2);
                            newW = halfW * 2;
                            newH = h;
                            offCanvas.width = newW;
                            offCanvas.height = newH;
                            offCtx.drawImage(img, w - halfW, 0, halfW, h, newW - halfW, 0, halfW, h);
                            offCtx.save();
                            offCtx.scale(-1, 1);
                            offCtx.drawImage(img, w - halfW, 0, halfW, h, -(newW - halfW), 0, halfW, h);
                            offCtx.restore();
                        } else if (direction === 'top') {
                            halfH = Math.ceil(h / 2);
                            newW = w;
                            newH = halfH * 2;
                            offCanvas.width = newW;
                            offCanvas.height = newH;
                            offCtx.drawImage(img, 0, 0, w, halfH, 0, 0, w, halfH);
                            offCtx.save();
                            offCtx.translate(0, newH);
                            offCtx.scale(1, -1);
                            offCtx.drawImage(img, 0, 0, w, halfH, 0, 0, w, halfH);
                            offCtx.restore();
                        } else if (direction === 'bottom') {
                            halfH = Math.ceil(h / 2);
                            newW = w;
                            newH = halfH * 2;
                            offCanvas.width = newW;
                            offCanvas.height = newH;
                            offCtx.drawImage(img, 0, h - halfH, w, halfH, 0, newH - halfH, w, halfH);
                            offCtx.save();
                            offCtx.scale(1, -1);
                            offCtx.drawImage(img, 0, h - halfH, w, halfH, 0, -(newH - halfH), w, halfH);
                            offCtx.restore();
                        }

                        offCanvas.toBlob(function(blob) {
                            if (blob) resolve(blob);
                            else reject(new Error('toBlob 失败'));
                        }, mimeType, quality);
                    } catch (err) {
                        reject(err);
                    }
                });
            }

            // ==========================================
            // 6. 文件管理
            // ==========================================
            let idCounter = 0;

            function addFileItem(file) {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = function() {
                    const item = {
                        id: ++idCounter,
                        file: file,
                        image: img,
                        direction: 'left',
                        blobUrl: url,
                        loaded: true
                    };
                    fileItems.push(item);
                    renderList();
                    updateToolbar();
                    // 如果是第一个文件，自动选中
                    if (fileItems.length === 1) {
                        selectFile(item.id);
                    } else {
                        // 否则选中最后一个
                        selectFile(item.id);
                    }
                    // 显示批量区
                    if (fileItems.length >= 2) {
                        batchArea.classList.add('active');
                    }
                    // 确保预览区显示
                    previewArea.classList.add('active');
                    actionRow.classList.add('active');
                };
                img.onerror = function() {
                    URL.revokeObjectURL(url);
                    alert('图片加载失败: ' + file.name);
                };
                img.src = url;
            }

            function removeFileItem(id) {
                const idx = fileItems.findIndex(it => it.id === id);
                if (idx === -1) return;
                const item = fileItems[idx];
                if (item.blobUrl) URL.revokeObjectURL(item.blobUrl);
                fileItems.splice(idx, 1);
                if (selectedId === id) {
                    if (fileItems.length > 0) {
                        selectFile(fileItems[0].id);
                    } else {
                        selectedId = null;
                        previewArea.classList.remove('active');
                        actionRow.classList.remove('active');
                        batchArea.classList.remove('active');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                }
                renderList();
                updateToolbar();
                if (fileItems.length < 2) {
                    batchArea.classList.remove('active');
                }
                if (fileItems.length === 0) {
                    emptyTip.style.display = 'block';
                }
            }

            function selectFile(id) {
                const item = fileItems.find(it => it.id === id);
                if (!item || !item.loaded) return;
                selectedId = id;
                // 更新列表高亮
                renderList();
                // 更新预览
                applyMirrorToCanvas(item.image, item.direction);
                // 更新方向按钮状态
                directionBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.dir === item.direction);
                });
                // 更新预览区的方向按钮
                // 启用下载
                downloadBtn.disabled = false;
                previewArea.classList.add('active');
                actionRow.classList.add('active');
            }

            function updateFileDirection(id, direction) {
                const item = fileItems.find(it => it.id === id);
                if (!item || !item.loaded) return;
                item.direction = direction;
                if (selectedId === id) {
                    applyMirrorToCanvas(item.image, direction);
                    directionBtns.forEach(btn => {
                        btn.classList.toggle('active', btn.dataset.dir === direction);
                    });
                }
                renderList();
            }

            function setAllDirections(direction) {
                fileItems.forEach(item => {
                    if (item.loaded) {
                        item.direction = direction;
                    }
                });
                if (selectedId) {
                    const sel = fileItems.find(it => it.id === selectedId);
                    if (sel && sel.loaded) {
                        applyMirrorToCanvas(sel.image, direction);
                        directionBtns.forEach(btn => {
                            btn.classList.toggle('active', btn.dataset.dir === direction);
                        });
                    }
                }
                renderList();
                // 更新工具栏按钮高亮
                toolDirBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.dir === direction);
                });
            }

            function clearAllFiles() {
                fileItems.forEach(item => {
                    if (item.blobUrl) URL.revokeObjectURL(item.blobUrl);
                });
                fileItems = [];
                selectedId = null;
                previewArea.classList.remove('active');
                actionRow.classList.remove('active');
                batchArea.classList.remove('active');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                renderList();
                updateToolbar();
                emptyTip.style.display = 'block';
                downloadBtn.disabled = true;
            }

            // ==========================================
            // 7. 渲染
            // ==========================================
            function renderList() {
                if (fileItems.length === 0) {
                    fileList.classList.remove('active');
                    emptyTip.style.display = 'block';
                    return;
                }
                fileList.classList.add('active');
                emptyTip.style.display = 'none';

                let html = '';
                fileItems.forEach(item => {
                    const isActive = (item.id === selectedId);
                    const dir = item.direction;
                    const sizeStr = item.file.size > 1024 * 1024 ?
                        (item.file.size / 1024 / 1024).toFixed(1) + ' MB' :
                        (item.file.size / 1024).toFixed(0) + ' KB';
                    html += `
                        <div class="file-item ${isActive ? 'active' : ''}" data-id="${item.id}">
                            <img class="thumb" src="${item.blobUrl}" alt="${item.file.name}">
                            <div class="info">
                                <div class="name">${escapeHtml(item.file.name)}</div>
                                <div class="size">${sizeStr}</div>
                            </div>
                            <div class="dir-select">
                                <button class="dbtn ${dir === 'left' ? 'active' : ''}" data-dir="left" data-id="${item.id}">←</button>
                                <button class="dbtn ${dir === 'right' ? 'active' : ''}" data-dir="right" data-id="${item.id}">→</button>
                                <button class="dbtn ${dir === 'top' ? 'active' : ''}" data-dir="top" data-id="${item.id}">↑</button>
                                <button class="dbtn ${dir === 'bottom' ? 'active' : ''}" data-dir="bottom" data-id="${item.id}">↓</button>
                            </div>
                            <button class="btn-del" data-id="${item.id}">✕</button>
                        </div>
                    `;
                });
                fileList.innerHTML = html;

                // 事件绑定：点击列表项选中
                fileList.querySelectorAll('.file-item').forEach(el => {
                    const id = parseInt(el.dataset.id);
                    el.addEventListener('click', function(e) {
                        // 如果点击的是按钮，不触发
                        if (e.target.closest('.dir-select') || e.target.closest('.btn-del')) return;
                        selectFile(id);
                    });
                });

                // 事件绑定：方向按钮
                fileList.querySelectorAll('.dir-select .dbtn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = parseInt(this.dataset.id);
                        const dir = this.dataset.dir;
                        updateFileDirection(id, dir);
                        // 同步工具栏高亮（如果所有文件方向一致）
                        syncToolbarHighlight();
                    });
                });

                // 事件绑定：删除
                fileList.querySelectorAll('.btn-del').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = parseInt(this.dataset.id);
                        removeFileItem(id);
                        syncToolbarHighlight();
                    });
                });
            }

            function updateToolbar() {
                fileCount.textContent = `📎 ${fileItems.length} 个文件`;
                toolbar.classList.toggle('active', fileItems.length > 0);
                if (fileItems.length > 0) {
                    syncToolbarHighlight();
                }
            }

            function syncToolbarHighlight() {
                if (fileItems.length === 0) return;
                // 检查所有文件方向是否一致
                const firstDir = fileItems[0].direction;
                const allSame = fileItems.every(it => it.direction === firstDir);
                toolDirBtns.forEach(btn => {
                    if (allSame) {
                        btn.classList.toggle('active', btn.dataset.dir === firstDir);
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==========================================
            // 8. 上传逻辑
            // ==========================================
            function handleFiles(files) {
                if (!files || files.length === 0) return;
                let loaded = 0;
                for (const file of files) {
                    if (!file.type.startsWith('image/')) {
                        alert('跳过非图片文件: ' + file.name);
                        continue;
                    }
                    addFileItem(file);
                    loaded++;
                }
                if (loaded > 0 && fileItems.length > 0) {
                    // 确保选中最后一个
                    selectFile(fileItems[fileItems.length - 1].id);
                }
                // 清空 input 以便重复上传同一文件
                fileInput.value = '';
            }

            fileInput.addEventListener('change', function(e) {
                handleFiles(e.target.files);
            });

            dropZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', function(e) {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });
            dropZone.addEventListener('drop', function(e) {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    handleFiles(e.dataTransfer.files);
                }
            });

            // ==========================================
            // 9. 预览区方向控制
            // ==========================================
            directionBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    if (!selectedId) return;
                    const dir = this.dataset.dir;
                    updateFileDirection(selectedId, dir);
                    syncToolbarHighlight();
                });
            });

            // ==========================================
            // 10. 工具栏统一方向
            // ==========================================
            toolDirBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const dir = this.dataset.dir;
                    setAllDirections(dir);
                });
            });

            // ==========================================
            // 11. 清空 (使用自定义确认)
            // ==========================================
            clearAllBtn.addEventListener('click', async function() {
                if (fileItems.length === 0) return;
                const confirmed = await showConfirm('确定清空所有图片吗？', '清空确认');
                if (confirmed) {
                    clearAllFiles();
                }
            });

            // ==========================================
            // 12. 单张下载
            // ==========================================
            downloadBtn.addEventListener('click', function() {
                if (downloadBtn.disabled || !selectedId) return;
                const item = fileItems.find(it => it.id === selectedId);
                if (!item || !item.loaded) return;

                const selectedFormat = formatSelect.value;
                const mimeMap = { png: 'image/png', jpeg: 'image/jpeg', webp: 'image/webp' };
                let mimeType = 'image/png';
                let ext = 'png';

                if (selectedFormat === 'original') {
                    const originalType = item.file.type;
                    if (originalType === 'image/jpeg') { mimeType = 'image/jpeg';
                        ext = 'jpg'; } else if (originalType === 'image/webp') { mimeType = 'image/webp';
                        ext = 'webp'; } else { mimeType = 'image/png';
                        ext = 'png'; }
                    const origExt = item.file.name.split('.').pop().toLowerCase();
                    if (['jpg', 'jpeg', 'png', 'webp'].includes(origExt)) {
                        ext = origExt === 'jpeg' ? 'jpg' : origExt;
                    }
                } else {
                    mimeType = mimeMap[selectedFormat] || 'image/png';
                    ext = selectedFormat;
                }

                const baseName = item.file.name.replace(/\.[^.]+$/, '') || 'image';
                const dirSuffix = DIR_MAP[item.direction] || 'l';
                const link = document.createElement('a');
                link.download = `${baseName}_mirror_${dirSuffix}.${ext}`;

                // 使用当前 canvas 内容 (已经渲染好了)
                try {
                    link.href = canvas.toDataURL(mimeType, 0.92);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (err) {
                    alert('下载失败: ' + err.message);
                }
            });

            // ==========================================
            // 13. 批量导出 ZIP (已修改时间戳至秒)
            // ==========================================
            batchBtn.addEventListener('click', async function() {
                if (isProcessing) return;
                if (fileItems.length === 0) {
                    alert('请先上传图片');
                    return;
                }

                // 检查是否所有文件都已加载
                const allLoaded = fileItems.every(it => it.loaded);
                if (!allLoaded) {
                    alert('部分图片尚未加载完成，请稍候');
                    return;
                }

                const format = batchFormatSelect.value;
                const mimeMap = { png: 'image/png', jpeg: 'image/jpeg', webp: 'image/webp' };
                const quality = 0.92;

                isProcessing = true;
                batchBtn.disabled = true;
                batchBtn.textContent = '⏳ 处理中...';
                batchProgress.classList.add('active');
                progressFill.style.width = '0%';
                progressText.textContent = '准备中...';

                try {
                    const zip = new JSZip();
                    const total = fileItems.length;
                    let completed = 0;

                    for (const item of fileItems) {
                        const dir = item.direction;
                        const img = item.image;

                        // 确定 MIME 和扩展名
                        let mimeType, ext;
                        if (format === 'original') {
                            const origType = item.file.type;
                            if (origType === 'image/jpeg') { mimeType = 'image/jpeg';
                                ext = 'jpg'; } else if (origType === 'image/webp') { mimeType = 'image/webp';
                                ext = 'webp'; } else { mimeType = 'image/png';
                                ext = 'png'; }
                            const origExt = item.file.name.split('.').pop().toLowerCase();
                            if (['jpg', 'jpeg', 'png', 'webp'].includes(origExt)) {
                                ext = origExt === 'jpeg' ? 'jpg' : origExt;
                            }
                        } else {
                            mimeType = mimeMap[format] || 'image/png';
                            ext = format;
                        }

                        progressText.textContent = `处理中 ${completed + 1}/${total} : ${item.file.name}`;
                        progressFill.style.width = `${(completed / total) * 100}%`;

                        const blob = await generateMirrorBlob(img, dir, mimeType, quality);
                        const baseName = item.file.name.replace(/\.[^.]+$/, '') || 'image';
                        const dirSuffix = DIR_MAP[dir] || 'l';
                        const fileName = `${baseName}_mirror_${dirSuffix}.${ext}`;

                        zip.file(fileName, blob);
                        completed++;
                        progressFill.style.width = `${(completed / total) * 100}%`;
                    }

                    progressText.textContent = '正在打包 ZIP ...';
                    progressFill.style.width = '90%';

                    const zipBlob = await zip.generateAsync({ type: 'blob' }, (metadata) => {
                        progressText.textContent =
                            `打包中 ${Math.round(metadata.percent)}%`;
                        progressFill.style.width = `${90 + (metadata.percent / 100) * 10}%`;
                    });

                    progressText.textContent = '下载中 ...';
                    progressFill.style.width = '100%';

                    // 下载 ZIP —— 文件名精确到秒 (年月日-时分秒)
                    const now = new Date();
                    const pad = (n) => String(n).padStart(2, '0');
                    const timestamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}-${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;

                    const link = document.createElement('a');
                    link.download = `镜像_批量_${timestamp}.zip`;
                    link.href = URL.createObjectURL(zipBlob);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    setTimeout(() => {
                        URL.revokeObjectURL(link.href);
                    }, 10000);

                    progressText.textContent = '✅ 导出完成！';

                } catch (err) {
                    console.error(err);
                    alert('批量导出失败: ' + err.message);
                    progressText.textContent = '❌ 导出失败';
                } finally {
                    isProcessing = false;
                    batchBtn.disabled = false;
                    batchBtn.textContent = '⬇ 导出全部 ZIP';
                    setTimeout(() => {
                        batchProgress.classList.remove('active');
                        progressFill.style.width = '0%';
                    }, 3000);
                }
            });

            // ==========================================
            // 14. 初始化
            // ==========================================
            downloadBtn.disabled = true;
            emptyTip.style.display = 'block';
            fileList.classList.remove('active');
            toolbar.classList.remove('active');
            batchArea.classList.remove('active');

            console.log('🪞 镜像一键生成器 · 精简版已加载');
        })();
    </script>
</body>
</html>
