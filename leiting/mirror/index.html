<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>镜像一键生成器</title>
    <style>
        /* 【彻底消灭蓝框策略】 */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent !important; 
            box-shadow: none !important; 
        }
        button:focus, input:focus, select:focus, textarea:focus, canvas:focus, a:focus {
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            box-shadow: none !important;
        }
        input, button, select { -webkit-appearance: none; appearance: none; }

        body { 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; 
            transition: background 0.8s ease; font-family: system-ui, -apple-system, sans-serif; 
        }
        
        .container { 
            width: 100%; max-width: 640px; 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(24px) saturate(180%); 
            -webkit-backdrop-filter: blur(24px) saturate(180%); 
            padding: 30px 32px; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.7); 
        }
        
        h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 28px; color: #1a1a2e; }
        
        .upload-box { 
            position: relative; border: 2px dashed rgba(0, 0, 0, 0.15); padding: 36px 20px; 
            border-radius: 20px; background: rgba(255, 255, 255, 0.4); cursor: pointer; 
            transition: 0.25s; margin-bottom: 16px; 
        }
        .upload-box:hover { border-color: #ff6b6b; background: rgba(255, 245, 245, 0.6); }
        .upload-box.dragover { border-color: #ff5252; background: rgba(255, 245, 245, 0.8); transform: scale(1.01); }
        
        .upload-box input { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; 
            z-index: 10; cursor: pointer; margin: 0; padding: 0; 
        }
        .upload-icon { font-size: 40px; margin-bottom: 6px; pointer-events: none; }
        .upload-box > div { pointer-events: none; color: #1f2937; font-weight: 500; }

        #previewArea { 
            display: none; margin-top: 12px; background: rgba(241, 245, 249, 0.3); 
            padding: 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.6); 
        }
        #previewArea.active { display: block; }
        
        canvas { 
            max-width: 100%; max-height: 400px; border-radius: 12px; background: #ffffff; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.06); margin: 0 auto; display: block; 
        }

        .action-row { 
            display: none; flex-direction: column; align-items: stretch; gap: 14px; 
            margin-top: 20px; width: 100%; 
        }
        .action-row.active { display: flex; }

        .direction-group { 
            display: flex; justify-content: space-between; gap: 10px; width: 100%; 
        }
        .dir-btn { 
            flex: 1; min-width: 50px; padding: 10px 0; border-radius: 14px; 
            border: 1px solid rgba(0, 0, 0, 0.08); background: rgba(255, 255, 255, 0.8); cursor: pointer; 
            font-weight: 600; font-size: 15px; color: #4b5563; transition: 0.2s; 
            text-align: center; outline: none !important; box-shadow: none !important;
        }
        .dir-btn:hover { background: #ffffff; transform: translateY(-1px); }
        .dir-btn.active { 
            border-color: #ff5252; background: #fff5f5; color: #ff5252; 
            box-shadow: 0 0 0 2px rgba(255, 82, 82, 0.15) !important; 
        }

        .format-download-row { 
            display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; width: 100%; 
        }
        
        .select-wrapper { 
            position: relative; display: inline-block; flex: 1; min-width: 100px; max-width: 180px; 
        }
        .select-wrapper::after { 
            content: '▼'; font-size: 12px; color: #9ca3af; position: absolute; right: 14px; 
            top: 50%; transform: translateY(-50%); pointer-events: none; 
        }
        select { 
            width: 100%; background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 0, 0, 0.08); padding: 10px 34px 10px 14px; 
            border-radius: 14px; font-size: 14px; font-weight: 500; color: #1f2937; cursor: pointer; 
            transition: 0.2s; outline: none !important; box-shadow: none !important;
        }
        select:focus { border-color: #ff5252; background: #fffafa; }

        .btn-download { 
            flex: 1; min-width: 110px; background: #ff5252; color: #ffffff; border: none; 
            padding: 10px 20px; border-radius: 14px; font-size: 15px; font-weight: 600; 
            cursor: pointer; transition: 0.15s; outline: none !important; box-shadow: none !important;
        }
        .btn-download:hover { background: #e04848; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255, 82, 82, 0.3) !important; }
        .btn-download:active { transform: scale(0.96); }
        .btn-download:disabled { background: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>镜像一键生成器</h1>

        <div class="upload-box" id="dropZone">
            <div class="upload-icon">☁️</div>
            <div>点击上传 或 拖拽图片至此处</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div id="previewArea">
            <canvas id="outputCanvas"></canvas>
            
            <div class="action-row" id="actionRow">
                <div class="direction-group" id="directionGroup">
                    <button class="dir-btn active" data-dir="left">← 左</button>
                    <button class="dir-btn" data-dir="right">右 →</button>
                    <button class="dir-btn" data-dir="top">↑ 上</button>
                    <button class="dir-btn" data-dir="bottom">下 ↓</button>
                </div>

                <div class="format-download-row">
                    <div class="select-wrapper">
                        <select id="formatSelect">
                            <option value="original">原格式</option>
                            <option value="png">PNG</option>
                            <option value="jpeg">JPG</option>
                            <option value="webp">WEBP</option>
                        </select>
                    </div>
                    <button class="btn-download" id="downloadBtn">镜像下载</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==========================================
            // 1. 全随机渐变色背景
            // ==========================================
            function getRandomHSL() {
                const hue = Math.floor(Math.random() * 360);
                const saturation = Math.floor(Math.random() * 40) + 60;
                const lightness = Math.floor(Math.random() * 30) + 50;
                return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            }
            const color1 = getRandomHSL();
            const color2 = getRandomHSL();
            document.body.style.background = `linear-gradient(135deg, ${color1}, ${color2})`;

            // ==========================================
            // 2. 核心变量绑定
            // ==========================================
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const canvas = document.getElementById('outputCanvas');
            const ctx = canvas.getContext('2d');
            const previewArea = document.getElementById('previewArea');
            const actionRow = document.getElementById('actionRow');
            const formatSelect = document.getElementById('formatSelect');
            const downloadBtn = document.getElementById('downloadBtn');
            const directionBtns = document.querySelectorAll('.dir-btn');

            let currentFileBlob = null;
            let originalImage = null;
            let currentDirection = 'left';

            // ==========================================
            // 3. 镜像核心算法 (无缝防白边)
            // ==========================================
            function applyMirror(direction) {
                if (!originalImage) return;
                const w = originalImage.width;
                const h = originalImage.height;
                let halfW, halfH, newW, newH;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (direction === 'left') {
                    halfW = Math.ceil(w / 2);
                    newW = halfW * 2; newH = h;
                    canvas.width = newW; canvas.height = newH;
                    ctx.drawImage(originalImage, 0, 0, halfW, h, 0, 0, halfW, h);
                    ctx.save(); ctx.translate(newW, 0); ctx.scale(-1, 1);
                    ctx.drawImage(originalImage, 0, 0, halfW, h, 0, 0, halfW, h); ctx.restore();
                } 
                else if (direction === 'right') {
                    halfW = Math.ceil(w / 2);
                    newW = halfW * 2; newH = h;
                    canvas.width = newW; canvas.height = newH;
                    ctx.drawImage(originalImage, w - halfW, 0, halfW, h, newW - halfW, 0, halfW, h);
                    ctx.save(); ctx.scale(-1, 1);
                    ctx.drawImage(originalImage, w - halfW, 0, halfW, h, -(newW - halfW), 0, halfW, h); ctx.restore();
                } 
                else if (direction === 'top') {
                    halfH = Math.ceil(h / 2);
                    newW = w; newH = halfH * 2;
                    canvas.width = newW; canvas.height = newH;
                    ctx.drawImage(originalImage, 0, 0, w, halfH, 0, 0, w, halfH);
                    ctx.save(); ctx.translate(0, newH); ctx.scale(1, -1);
                    ctx.drawImage(originalImage, 0, 0, w, halfH, 0, 0, w, halfH); ctx.restore();
                } 
                else if (direction === 'bottom') {
                    halfH = Math.ceil(h / 2);
                    newW = w; newH = halfH * 2;
                    canvas.width = newW; canvas.height = newH;
                    ctx.drawImage(originalImage, 0, h - halfH, w, halfH, 0, newH - halfH, w, halfH);
                    ctx.save(); ctx.scale(1, -1);
                    ctx.drawImage(originalImage, 0, h - halfH, w, halfH, 0, -(newH - halfH), w, halfH); ctx.restore();
                }
            }

            // ==========================================
            // 4. 上传与拖拽逻辑
            // ==========================================
            function handleFileProcess(file) {
                if (!file) return;
                downloadBtn.disabled = false;
                currentFileBlob = file;

                const ext = file.name.split('.').pop().toLowerCase();
                if (['gif','png','jpg','jpeg','webp'].includes(ext)) formatSelect.value = 'original';

                const url = URL.createObjectURL(file);
                const img = new Image();
                
                img.onload = function() {
                    originalImage = img;
                    directionBtns.forEach(b => b.classList.remove('active'));
                    document.querySelector('.dir-btn[data-dir="left"]').classList.add('active');
                    currentDirection = 'left';
                    
                    applyMirror('left');
                    previewArea.classList.add('active');
                    actionRow.classList.add('active');
                    URL.revokeObjectURL(url);
                };
                
                img.onerror = function() { alert("图片格式可能损坏，请检查后重试。"); }
                img.src = url;
            }

            fileInput.addEventListener('change', function(e) {
                handleFileProcess(e.target.files[0]);
                fileInput.value = '';
            });

            dropZone.addEventListener('dragover', function(e) {
                e.preventDefault(); dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', function(e) {
                e.preventDefault(); dropZone.classList.remove('dragover');
            });
            dropZone.addEventListener('drop', function(e) {
                e.preventDefault(); dropZone.classList.remove('dragover');
                if(e.dataTransfer.files.length > 0) handleFileProcess(e.dataTransfer.files[0]);
            });

            directionBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    directionBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentDirection = this.dataset.dir;
                    if (originalImage) applyMirror(currentDirection);
                });
            });

            // ==========================================
            // 5. 下载逻辑（解决按钮无响应，添加方向后缀）
            // ==========================================
            downloadBtn.addEventListener('click', function() {
                if (downloadBtn.disabled) return;
                
                const currentBtn = this;
                currentBtn.disabled = true; // 立即禁用防止连续点击

                // 【关键修复】部分浏览器在同步处理 toDataURL 时会造成点击事件假死。
                // 使用 setTimeout 将耗时操作推迟到事件循环的下一帧，确保触发浏览器的下载机制
                setTimeout(function() {
                    try {
                        const selectedFormat = formatSelect.value;
                        let mimeType = 'image/png', ext = 'png';
                        const mimeMap = { 'png': 'image/png', 'jpeg': 'image/jpeg', 'webp': 'image/webp' };

                        let baseName = 'image';
                        if (currentFileBlob) {
                            const originalName = currentFileBlob.name;
                            const dotIndex = originalName.lastIndexOf('.');
                            baseName = dotIndex > 0 ? originalName.substring(0, dotIndex) : originalName;
                        }

                        if (selectedFormat === 'original') {
                            if (currentFileBlob) {
                                const originalType = currentFileBlob.type;
                                const originalNameExt = currentFileBlob.name.split('.').pop();
                                if (originalType === 'image/jpeg') { mimeType = 'image/jpeg'; ext = 'jpg'; }
                                else if (originalType === 'image/webp') { mimeType = 'image/webp'; ext = 'webp'; }
                                else { mimeType = 'image/png'; ext = 'png'; }
                                ext = originalNameExt;
                                if (ext === 'jpeg') ext = 'jpg';
                            } else {
                                mimeType = 'image/png'; ext = 'png';
                            }
                        } else {
                            mimeType = mimeMap[selectedFormat];
                            ext = selectedFormat;
                        }

                        // 方向映射 l r u d
                        const dirSuffixMap = {
                            left: 'l',
                            right: 'r',
                            top: 'u',
                            bottom: 'd'
                        };
                        // 拼接后缀：原文件名_mirror_方向.格式
                        const dirSuffix = dirSuffixMap[currentDirection] || 'l'; 

                        const link = document.createElement('a');
                        // 应用新命名规则
                        link.download = `${baseName}_mirror_${dirSuffix}.${ext}`;
                        link.href = canvas.toDataURL(mimeType, 0.92);
                        
                        // 【兜底方案】部分浏览器如果只是 link.click() 会没反应，加个 DOM 插入再移除
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);

                    } catch (error) {
                        console.error("下载出错", error);
                        alert("下载失败，可能是图片过大导致内存不足，请尝试选择不同的格式导出。");
                    } finally {
                        // 保证无论成功还是报错，最终都会解除按钮锁定
                        currentBtn.disabled = false;
                    }
                }, 0); // 0 毫秒延迟，将其推入微任务
            });
        })();
    </script>
</body>
</html>
